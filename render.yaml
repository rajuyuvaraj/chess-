services:
  - type: web
    name: chess-tournament-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chess-postgres
          property: connectionString

databases:
  - name: chess-postgres
    databaseName: tourney_db
    user: admin
    plan: free
